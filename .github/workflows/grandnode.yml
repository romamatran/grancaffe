name: Build and Deploy GranCaffe


on:

  push:

    branches:
      - develop
      - main


  workflow_dispatch:



permissions:

  contents: read

  packages: write



env:

  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/grancaffe



jobs:


  build-and-deploy:


    name: Build Docker image and deploy to DigitalOcean


    runs-on: ubuntu-latest



    steps:



      #################################
      # Checkout
      #################################

      - name: Checkout repository

        uses: actions/checkout@v4





      #################################
      # Docker setup
      #################################

      - name: Setup QEMU

        uses: docker/setup-qemu-action@v3



      - name: Setup Docker Buildx

        uses: docker/setup-buildx-action@v3





      #################################
      # Login GHCR
      #################################

      - name: Login to GitHub Container Registry

        uses: docker/login-action@v3

        with:

          registry: ghcr.io

          username: ${{ github.actor }}

          password: ${{ secrets.GITHUB_TOKEN }}






      #################################
      # Image tag
      #################################

      - name: Define image tag


        run: |


          if [ "${{ github.ref_name }}" = "main" ]; then

            echo "IMAGE_TAG=latest" >> $GITHUB_ENV


          else

            echo "IMAGE_TAG=develop" >> $GITHUB_ENV


          fi






      #################################
      # Build and push Docker image
      #################################

      - name: Build and push Docker image


        uses: docker/build-push-action@v6


        with:


          context: .


          file: ./Dockerfile


          push: true


          platforms: linux/amd64


          tags: |


            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

            ${{ env.IMAGE_NAME }}:${{ github.sha }}




          build-args: |


            GIT_COMMIT=${{ github.sha }}


            GIT_BRANCH=${{ github.ref_name }}




          cache-from: |

            type=gha



          cache-to: |

            type=gha,mode=max






      #################################
      # Deploy DigitalOcean
      #################################

      - name: Deploy to DigitalOcean Droplet


        uses: appleboy/ssh-action@v1.2.0



        with:


          host: ${{ secrets.DO_HOST }}


          username: ${{ secrets.DO_USER }}


          key: ${{ secrets.DO_SSH_KEY }}



          script: |



            set -e



            echo "Go to application directory"



            cd /opt/grancaffe





            echo "Login GHCR"



            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \

              -u ${{ github.repository_owner }} \

              --password-stdin





            echo "Pull new image"



            docker compose pull





            echo "Restart application"



            docker compose up -d --remove-orphans





            echo "Cleanup old images"



            docker image prune -f





            echo "Deployment finished"






      #################################
      # Health check
      #################################

      - name: Verify deployment



        uses: appleboy/ssh-action@v1.2.0



        with:


          host: ${{ secrets.DO_HOST }}


          username: ${{ secrets.DO_USER }}


          key: ${{ secrets.DO_SSH_KEY }}




          script: |



            set -e



            echo "Waiting application startup"



            sleep 20




            echo "Containers status"



            docker ps




            echo "Health check"



            curl --fail http://localhost:5000 || exit 1




            echo "Application is running"
