name: Deploy GranCaffe Production
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
  packages: write
env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/grancaffe
jobs:
  build-and-deploy:
    name: Build Docker Image and Deploy
    runs-on: ubuntu-latest
    steps:
    ###################################
    # Checkout
    ###################################
    - name: Checkout source
      uses: actions/checkout@v4
    ###################################
    # Docker setup
    ###################################
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
    ###################################
    # Login GHCR
    ###################################

    - name: Login GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    ###################################
    # Build and Push
    ###################################
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        platforms: linux/amd64
        tags: |
          ${{ env.IMAGE_NAME }}:latest
          ${{ env.IMAGE_NAME }}:${{ github.sha }}
        build-args: |
          GIT_COMMIT=${{ github.sha }}
          GIT_BRANCH=${{ github.ref_name }}
        cache-from:
          type=gha
        cache-to:
          type=gha,mode=max
    ###################################
    # Deploy DigitalOcean
    ###################################
    - name: Deploy to DigitalOcean
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.DO_HOST }}
        username: ${{ secrets.DO_USER }}
        key: ${{ secrets.DO_SSH_KEY }}
        script: |
          set -e
          echo "Go application folder"
          cd /opt/grancaffe
          echo "Login GHCR"
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
          -u ${{ github.repository_owner }} \
          --password-stdin
          echo "Pull latest image"
          docker compose pull
          echo "Restart services"
          docker compose up -d --remove-orphans
          echo "Cleanup old docker images"
          docker image prune -f
          echo "Deployment completed"
    ###################################
    # Verify
    ###################################
    - name: Health check
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.DO_HOST }}
        username: ${{ secrets.DO_USER }}
        key: ${{ secrets.DO_SSH_KEY }}
        script: |
          set -e
          echo "Containers status"
          docker ps
          echo "Wait application"
          sleep 20
          echo "HTTP check"
          curl --fail http://localhost:5000
          echo "GranCaffe is running"
